ing\":\"博客\",\"subtitle\":\"关于分布式系统、协议和软件工程的思考。\",\"empty\":\"暂无文章，敬请期待。\",\"minRead\":\"分钟阅读\",\"searchPlaceholder\":\"搜索文章...\"},\"cv\":{\"heading\":\"简历\",\"downloadPdf\":\"下载PDF\",\"experience\":\"工作经历\",\"education\":\"教育背景\",\"skills\":\"技能\",\"researchProfile\":\"研究简介\",\"researchInterests\":\"研究兴趣\",\"keyContributions\":\"重要研究贡献\",\"teaching\":\"教学经历\",\"publications\":\"代表性出版物\",\"standards\":\"标准 \u0026 开源\",\"recognition\":\"荣誉与奖项\",\"languages\":\"语言\",\"programming\":\"编程语言\",\"standardsCoAuthored\":\"共同编写的标准\",\"openSourceProjects\":\"开源项目\",\"position\":\"Eclipse Zenoh 项目负责人\",\"location\":\"吉夫-叙尔-伊维特，法国\",\"publicationsNote\":\"完整列表：100+ 同行评审出版物 · 1,478+ 引用 ·\",\"statPublications\":\"同行评审出版物\",\"statCitations\":\"引用次数\",\"statYearsExperience\":\"年工作经验\",\"statStandards\":\"国际标准\",\"skillCatLanguages\":\"编程语言\",\"skillCatProtocols\":\"协议 \u0026 标准\",\"skillCatDomains\":\"专业领域\",\"Italian\":\"意大利语\",\"English\":\"英语\",\"French\":\"法语\",\"Native\":\"母语\",\"Fluent\":\"流利\"},\"openSource\":{\"heading\":\"开源项目\",\"subtitle\":\"我创建或贡献的项目。星标和Fork数据从GitHub实时获取。\",\"loadError\":\"无法加载仓库，请稍后重试。\"},\"zenoh\":{\"heading\":\"Zenoh协议\",\"subtitle\":\"统一IoT / 边缘 / 云的连续体\",\"tagline\":\"一个统一运动中数据、静止数据和计算的协议。从2KB微控制器到云集群。\",\"feature1Title\":\"零开销\",\"feature1Desc\":\"专为资源最受限的环境设计。Zenoh的线格式最小化、高效且确定性。\",\"feature2Title\":\"随处运行\",\"feature2Desc\":\"从2KB RAM微控制器到多数据中心云部署。一个协议覆盖您技术栈的每一层。\",\"feature3Title\":\"位置透明\",\"feature3Desc\":\"生产者和消费者完全解耦。无需更改应用代码即可在边缘和云之间移动资源。\",\"reposTitle\":\"核心仓库\",\"comingSoonTitle\":\"深度技术文章即将在博客发布\",\"comingSoonDesc\":\"关于Zenoh设计决策、线格式和实际部署的深度技术系列文章即将发布。\",\"viewOnGitHub\":\"在GitHub上查看\",\"repo1Desc\":\"Zenoh协议的Rust参考实现。\",\"repo2Desc\":\"面向裸机和嵌入式目标的Zenoh no_std Rust实现。\",\"reportHeading\":\"Zenoh报告\",\"bookHeading\":\"Zenoh书籍\",\"papersHeading\":\"Zenoh论文\",\"talksHeading\":\"Zenoh演讲\",\"reportSubtitle\":\"Zenoh创新、生态系统亮点和社区故事的每月摘要。\",\"reportDownload\":\"下载\",\"genesisHeading\":\"Zenoh的起源\",\"genesisSubtitle\":\"一个从需求中诞生的协议 — 以哲学家之名命名\",\"bookSubtitle\":\"Zenoh协议综合指南 — 架构、概念与实践示例。\",\"bookChaptersTitle\":\"目录\",\"bookBuiltWith\":\"使用mdBook构建 · 由Rust驱动\",\"bookReadOnline\":\"在线阅读\",\"genesisIntro\":\"大约在2009–2010年，Angelo Corsaro担任PrismTech的首席技术官，并共同主持OMG DDS特别兴趣小组，致力于一些最早的超大规模系统——涵盖军事、航空航天和智慧城市基础设施的部署。两个结构性问题逐渐清晰。\",\"genesisScaleProblemTitle\":\"规模问题\",\"genesisScaleProblemDesc\":\"DDS无法向上扩展到全球网络，也无法向下缩小到受限设备。CoAP过于以云为中心；MQTT的代理模型迫使即使是同一网络上的设备也要通过数千公里外的服务器进行通信。\",\"genesisTransparencyGapTitle\":\"透明度差距\",\"genesisTransparencyGapDesc\":\"Pub/Sub已经实现了动态数据的位置透明性。但一旦数据被存储，这种透明性就消失了——迫使所有内容转向集中式云存储。需要低延迟访问存储数据的应用程序没有好的解决方案。\",\"genesisFrankenstein\":\"那个时代的系统——Angelo称之为“数字科学怪人”时代——是通过将多个协议栈拼凑在一起组装的。他的目标变得清晰：设计一个从微控制器到数据中心的单一协议，没有拓扑约束，为动态数据、静态数据和计算提供统一抽象。\",\"genesisQuote\":\"我必须做些什么。我开始研究一个协议的想法，这个协议可以从微控制器到数据中心高效运行，没有任何拓扑约束，并为处理动态数据和静态数据提供统一抽象。\",\"genesisWhyTitle\":\"为什么叫“Zenoh”？\",\"genesisWhyText1\":\"这个名字包含两个哲学参考和一个工程缩写。Angelo在西西里岛长大，被古希腊哲学的遗产所包围。他特别被埃利亚的芝诺（Zenon d’Élée）所吸引，其无穷悖论从小就令他着迷。\",\"genesisWhyText2\":\"斯多葛主义——由基提翁的芝诺创立——通过马可·奥勒留的《沉思录》留下了同样深刻的印记。\",\"genesisWhyFootnote\":\"Zenon和Zenoh之间的差异不到一个字母——它只是“h”的超出部分。\",\"exploreTitle\":\"探索Zenoh\",\"navCardReportDesc\":\"Zenoh创新、生态系统亮点和社区故事的月度摘要。\",\"navCardPapersDesc\":\"关于Zenoh协议的科学出版物和研究。\",\"navCardBookDesc\":\"Zenoh综合指南——架构、概念和实践示例。\",\"navCardTalksDesc\":\"Angelo Corsaro的会议演讲和技术讲座。\"},\"contact\":{\"heading\":\"联系我\",\"subtitle\":\"我随时乐于交流——无论是关于分布式系统、开源合作还是演讲机会。\",\"github\":\"开源项目和贡献\",\"linkedin\":\"专业资料和联系\",\"twitter\":\"关于分布式系统和技术的思考\"},\"footer\":{\"rights\":\"版权所有。\"},\"common\":{\"darkMode\":\"切换深色模式\",\"language\":\"语言\",\"openMenu\":\"打开菜单\",\"closeMenu\":\"关闭菜单\"}},\"now\":\"$undefined\",\"timeZone\":\"UTC\",\"children\":[\"$\",\"$L12\",null,{\"attribute\":\"class\",\"defaultTheme\":\"system\",\"enableSystem\":true,\"children\":[\"$\",\"div\",null,{\"className\":\"min-h-screen flex flex-col\",\"children\":[[\"$\",\"$L13\",null,{}],[\"$\",\"main\",null,{\"className\":\"flex-1\",\"children\":[\"$\",\"$L8\",null,{\"parallelRouterKey
